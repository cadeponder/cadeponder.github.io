<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/ica11.css">
    <title>Document</title>
</head>
<body>
    <div class="app">
        <header>Random Dogs</header>
        <section class="quotes">
          <div class="quote-text" id="js-quote-text"></div>
          <div id="myProgress">
  <div id="myBar"></div>
</div>
          <img style="width: 100%" id="dogs" src="https://dog.ceo/api/breeds/image/random" alt="">
        </section>
        <section class="controls">
          <button onclick="move()" type="button" id="js-new-quote" class="new-quote button">
            Generate a new dog
          </button>
          <a class="twitter button" id="js-tweet" target="_blank" rel="noreferrer">Tweet it!</a>
        </section>
        <p>I added a load bar to the dog generation button!</p>
      </div>

<script src="ica11.js"></script> 
</body>
</html>
